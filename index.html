<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Rental Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #121318;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- الهيدر العلوي --- */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background-color: #181922;
            border-bottom: 1px solid #222431;
        }

        .profile-info {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .circle-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #222431;
            border: 1px solid #2c2f44;
            color: #8b92b6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* --- المساحة الرئيسية للمحتوى --- */
        .content-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .page-view {
            display: none;
        }

        .page-view.active {
            display: block;
        }

        /* --- شريط التبويبات العلوي (مطابق للصورة تماماً) --- */
        .top-navigation-tabs {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #222431;
            padding-bottom: 10px;
            margin-bottom: 16px;
        }

        .nav-link {
            background: none;
            border: none;
            color: #7d849b;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            padding: 4px 0;
        }

        .nav-link.active {
            color: #52a5fc;
        }

        /* الخط الأزرق أسفل الزر النشط */
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #52a5fc;
            border-radius: 2px;
        }

        /* حاويات التصنيفات الداخلية لقسم للإيجار */
        .category-view {
            display: none;
        }

        .category-view.active {
            display: block;
        }

        /* صندوق المنتجات الفارغ (المجهز لاستقبال البيانات) */
        .empty-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #5d637a;
            font-size: 0.9rem;
            text-align: center;
            gap: 12px;
        }

        .empty-placeholder i {
            font-size: 2.5rem;
            color: #2c2f44;
        }

        /* قوائم التنسيق للأقسام الأخرى */
        .list-row-item {
            width: 100%;
            background-color: #181922;
            border: 1px solid #222431;
            padding: 16px;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: right;
        }

        /* --- شريط التنقل السفلي الاحترافي (للايجار بالمنتصف) --- */
        .dock-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(24, 25, 34, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid #222431;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 0 22px 0;
            z-index: 999;
        }

        .dock-tab {
            background: none;
            border: none;
            color: #7d849b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.68rem;
            font-weight: 600;
            gap: 5px;
            cursor: pointer;
        }

        .dock-tab i {
            font-size: 1.25rem;
        }

        /* تمييز زر للإيجار في المنتصف */
        .dock-tab.center-btn i {
            font-size: 1.4rem;
            background-color: #222431;
            padding: 8px;
            border-radius: 50%;
            border: 1px solid #2c2f44;
            margin-top: -20px;
        }

        .dock-tab.active {
            color: #52a5fc;
        }

        .dock-tab.center-btn.active i {
            background-color: #52a5fc;
            color: #fff;
            border-color: #52a5fc;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="profile-info">الملف الشخصي</div>
        <div class="action-buttons">
            <button class="circle-btn"><i class="fa-solid fa-sliders"></i></button>
            <button class="circle-btn"><i class="fa-solid fa-wallet"></i></button>
        </div>
    </div>

    <div class="content-area">

        <div id="view-rent" class="page-view active">
            
            <div class="top-navigation-tabs">
                <button class="nav-link active" onclick="switchCategory('cat-gifts', this)">الهدايا</button>
                <button class="nav-link" onclick="switchCategory('cat-users', this)">أسماء المستخدمين</button>
                <button class="nav-link" onclick="switchCategory('cat-numbers', this)">الأرقام</button>
            </div>

            <div id="cat-gifts" class="category-view active">
                <div class="empty-placeholder">
                    <i class="fa-solid fa-box-open"></i>
                    <p>لا توجد هدايا مطروحة للإيجار حالياً</p>
                </div>
            </div>

            <div id="cat-users" class="category-view">
                <div class="empty-placeholder">
                    <i class="fa-solid fa-at"></i>
                    <p>لا توجد أسماء مستخدمين مطروحة للإيجار حالياً</p>
                </div>
            </div>

            <div id="cat-numbers" class="category-view">
                <div class="empty-placeholder">
                    <i class="fa-solid fa-hashtag"></i>
                    <p>لا توجد أرقام متاحة للإيجار حالياً</p>
                </div>
            </div>

        </div>

        <div id="view-offer" class="page-view">
            <div class="list-row-item">➕ إضافة عرض جديد للمتجر</div>
        </div>

        <div id="view-active" class="page-view">
            <p style="text-align: center; color: #5d637a; margin-top: 40px;">لا توجد عقود نشطة</p>
        </div>

        <div id="view-my-offers" class="page-view">
            <p style="text-align: center; color: #5d637a; margin-top: 40px;">قائمة مقتنياتك فارغة</p>
        </div>

        <div id="view-wheel" class="page-view">
            <div class="list-row-item" style="text-align: center; color: #52a5fc;">🎰 العجلة اليومية جاهزة للتدوير</div>
        </div>

    </div>

    <div class="dock-navbar">
        <button class="dock-tab" onclick="changeTab('view-offer', this)">
            <i class="fa-solid fa-square-plus"></i>
            <span>عرض هدية</span>
        </button>
        <button class="dock-tab" onclick="changeTab('view-active', this)">
            <i class="fa-solid fa-receipt"></i>
            <span>النشطة</span>
        </button>
        
        <button class="dock-tab center-btn active" onclick="changeTab('view-rent', this)">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>للايجار</span>
        </button>
        
        <button class="dock-tab" onclick="changeTab('view-my-offers', this)">
            <i class="fa-solid fa-folder-open"></i>
            <span>عروضي</span>
        </button>
        <button class="dock-tab" onclick="changeTab('view-wheel', this)">
            <i class="fa-solid fa-circle-nodes"></i>
            <span>العجلة</span>
        </button>
    </div>

    <script>
        // دالة التنقل بين صفحات القائمة السفلية
        function changeTab(pageId, tabElement) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.dock-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            tabElement.classList.add('active');
        }

        // دالة التنقل بين فلاتر العناوين العلوية (هدايا، أسماء مستخدمين، أرقام)
        function switchCategory(catId, btnElement) {
            document.querySelectorAll('.category-view').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(t => t.classList.remove('active'));
            
            document.getElementById(catId).classList.add('active');
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
