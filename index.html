<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Gift Rental Premium</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

:root{

--bg:#07090F;

--card:#111827;

--card2:#171F2F;

--primary:#7C3AED;

--primary2:#A855F7;

--accent:#38BDF8;

--text:#F8FAFC;

--muted:#94A3B8;

--border:#2B3245;

--danger:#EF4444;

--radius:20px;

}

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Inter',sans-serif;

-webkit-tap-highlight-color:transparent;

user-select:none;

}

body{

background:

radial-gradient(circle at top,

#1E1B4B,

#07090F 45%);

color:var(--text);

height:100vh;

overflow:hidden;

display:flex;

flex-direction:column;

}

button{

border:none;

outline:none;

cursor:pointer;

transition:.30s;

}

::-webkit-scrollbar{

width:4px;

}

::-webkit-scrollbar-thumb{

background:var(--primary);

border-radius:20px;

}

.header{

height:72px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 18px;

background:rgba(15,23,42,.55);

backdrop-filter:blur(25px);

border-bottom:1px solid rgba(124,58,237,.20);

box-shadow:

0 0 25px rgba(124,58,237,.10);

}

.logo{

display:flex;

align-items:center;

gap:12px;

}

.logo-icon{

width:42px;

height:42px;

border-radius:14px;

background:

linear-gradient(135deg,

var(--primary),

var(--primary2));

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

box-shadow:

0 0 18px rgba(124,58,237,.45);

}

.logo-title{

display:flex;

flex-direction:column;

}

.logo-title h2{

font-size:18px;

font-weight:800;

}

.logo-title span{

font-size:12px;

color:var(--muted);

}

.header-actions{

display:flex;

align-items:center;

gap:10px;

}

.circle-btn{

width:42px;

height:42px;

border-radius:50%;

background:rgba(255,255,255,.05);

color:white;

border:1px solid rgba(255,255,255,.07);

display:flex;

align-items:center;

justify-content:center;

font-size:15px;

}

.circle-btn:hover{

transform:translateY(-2px);

background:rgba(124,58,237,.20);

}

.wallet{

padding:11px 18px;

border-radius:30px;

background:

linear-gradient(135deg,

var(--primary),

var(--primary2));

color:white;

font-weight:700;

display:flex;

gap:8px;

align-items:center;

box-shadow:

0 10px 25px rgba(124,58,237,.35);

}

.wallet:hover{

transform:scale(1.04);

}

.main{

flex:1;

overflow:auto;

padding:18px;

padding-bottom:120px;

}
    .content-card{

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.06);

border-radius:22px;

padding:18px;

margin-bottom:18px;

backdrop-filter:blur(18px);

transition:.35s;

}

.content-card:hover{

transform:translateY(-3px);

border-color:rgba(124,58,237,.35);

box-shadow:0 15px 40px rgba(124,58,237,.15);

}

.tabs{

display:flex;

gap:12px;

margin-bottom:20px;

overflow-x:auto;

scrollbar-width:none;

}

.tabs::-webkit-scrollbar{

display:none;

}

.tab{

padding:10px 18px;

border-radius:30px;

background:rgba(255,255,255,.04);

color:var(--muted);

font-weight:700;

white-space:nowrap;

}

.tab.active{

background:linear-gradient(135deg,var(--primary),var(--primary2));

color:white;

box-shadow:0 10px 25px rgba(124,58,237,.35);

}

.product{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px;

border-radius:22px;

margin-bottom:15px;

background:linear-gradient(135deg,#131C2F,#0E1625);

border:1px solid rgba(255,255,255,.06);

transition:.35s;

}

.product:hover{

transform:translateY(-4px);

box-shadow:0 15px 35px rgba(124,58,237,.20);

}

.product-left{

display:flex;

gap:14px;

align-items:center;

}

.product-icon{

width:56px;

height:56px;

border-radius:18px;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

background:linear-gradient(135deg,var(--primary),var(--accent));

box-shadow:0 10px 20px rgba(124,58,237,.35);

}

.product-info h3{

font-size:16px;

margin-bottom:6px;

}

.product-info p{

font-size:13px;

color:var(--muted);

}

.price{

font-size:20px;

font-weight:800;

color:var(--accent);

margin-bottom:8px;

text-align:center;

}

.rent-btn{

padding:10px 18px;

border-radius:16px;

background:linear-gradient(135deg,var(--primary),var(--primary2));

color:white;

font-weight:700;

box-shadow:0 8px 18px rgba(124,58,237,.35);

}

.rent-btn:hover{

transform:scale(1.05);

}

.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:82px;

background:rgba(15,23,42,.70);

backdrop-filter:blur(35px);

border-top:1px solid rgba(255,255,255,.06);

display:grid;

grid-template-columns:repeat(5,1fr);

align-items:center;

z-index:999;

}

.nav-item{

display:flex;

flex-direction:column;

align-items:center;

gap:6px;

color:var(--muted);

font-size:12px;

transition:.3s;

}

.nav-item i{

font-size:20px;

}

.nav-item.active{

color:white;

transform:translateY(-8px) scale(1.12);

}

.nav-item.active i{

color:var(--primary2);

filter:drop-shadow(0 0 12px rgba(168,85,247,.7));

}

</style>

</head>

<body>
    <div class="header">

    <div class="logo">

        <div class="logo-icon">
            <i class="fa-solid fa-gem"></i>
        </div>

        <div class="logo-title">
            <h2>Gift Rental</h2>
            <span>Premium Platform</span>
        </div>

    </div>

    <div class="header-actions">

        <button class="circle-btn">
            <i class="fa-solid fa-bell"></i>
        </button>

        <button class="circle-btn">
            <i class="fa-solid fa-gear"></i>
        </button>

        <button class="wallet">
            <i class="fa-solid fa-wallet"></i>
            TON Connect
        </button>

    </div>

</div>

<div class="main">

<div class="tabs">

<button class="tab active">
Gifts
</button>

<button class="tab">
Users
</button>

<button class="tab">
Numbers
</button>

</div>

<div class="content-card">

<div class="product">

<div class="product-left">

<div class="product-icon">
<i class="fa-solid fa-gift"></i>
</div>

<div class="product-info">

<h3>Premium Gift</h3>

<p>Luxury Telegram Gift Rental</p>

</div>

</div>

<div>

<div class="price">

20 TON

</div>

<button class="rent-btn">

Rent

</button>

</div>

</div>

</div>

</div>

<div class="bottom-nav">

<div class="nav-item active">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-folder-open"></i>

<span>Offers</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-plus"></i>

<span>Add</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-clock"></i>

<span>History</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</div>

</div>

<script>

// JavaScript هنا

</script>

</body>

</html>
