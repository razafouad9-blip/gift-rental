<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Rental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- الشريط العلوي --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #d4af37;
        }

        .top-bar .icon-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- المنطقة المركزية للمحتوى --- */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            padding-bottom: 90px; /* لكي لا يتغطى المحتوى بالشريط السفلي */
        }

        .app-title {
            color: #d4af37;
            font-size: 1.8rem;
            margin-top: 10px;
        }

        .app-subtitle {
            color: #aaaaaa;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* الكروت والبطاقات */
        .section-panel {
            width: 100%;
            max-width: 400px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            display: none; /* مخفي افتراضياً ويظهر حسب الزر المكبوس */
        }

        .section-panel.active {
            display: block;
        }

        /* أزرار الأقسام الداخلية */
        .sub-btn {
            width: 100%;
            background-color: #d4af37;
            color: #121212;
            border: none;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* --- القائمة السفلية المدمجة --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 5px;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: #888888;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            gap: 5px;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        /* زر الإيجار بالمنتصف يكون مميزاً وأكبر */
        .nav-item.center-btn {
            color: #d4af37;
            font-weight: bold;
        }
        
        .nav-item.center-btn i {
            font-size: 1.5rem;
            background-color: #262626;
            padding: 10px;
            border-radius: 50%;
            border: 1px solid #d4af37;
            margin-top: -25px;
        }

        .nav-item.active {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="icon-btn" onclick="alert('جاري فتح إعدادات الحساب وكلمة السر...')">
            <i class="fa-solid :">⚙️</i> الإعدادات
        </button>
        <button class="icon-btn" onclick="alert('جاري الاتصال بالمحفظة الإلكترونية...')">
            <i class="fa-solid">💳</i> ربط المحفظة
        </button>
    </div>

    <div class="main-content">
        <h1 class="app-title">Gift Rental</h1>
        <p class="app-subtitle">أفخم الهدايا والمناسبات بين يديك</p>

        <div id="rent-panel" class="section-panel active">
            <h3 style="color:#d4af37; margin-bottom:15px;">🔍 تصفح الأقسام المتاحة</h3>
            <button class="sub-btn" onclick="alert('فتح قسم الهدايا')">🎁 قسم الهدايا</button>
            <button class="sub-btn" onclick="alert('فتح قسم اليوزرات')">🆔 قسم اليوزرات</button>
            <button class="sub-btn" onclick="alert('فتح قسم الأرقام المجهولة')">📞 أرقام مجهولة</button>
        </div>

        <div id="offer-panel" class="section-panel">
            <h3 style="color:#d4af37; margin-bottom:15px;">➕ ماذا تريد أن تعرض للإيجار؟</h3>
            <button class="sub-btn">🎁 عرض هدية جديد</button>
            <button class="sub-btn">🆔 عرض يوزر مميز</button>
            <button class="sub-btn">📞 عرض رقم مجهول</button>
        </div>

        <div id="active-panel" class="section-panel">
            <h3 style="color:#d4af37; margin-bottom:15px;">📂 إيجاراتك النشطة</h3>
            <p style="color:#aaa;">لا توجد مقتنيات مستأجرة حالياً.</p>
        </div>

        <div id="my-offers-panel" class="section-panel">
            <h3 style="color:#d4af37; margin-bottom:15px;">📦 مقتنياتك المعروضة</h3>
            <p style="color:#aaa;">لم تقم بعرض أي شيء للإيجار بعد.</p>
        </div>

        <div id="wheel-panel" class="section-panel">
            <h3 style="color:#d4af37; margin-bottom:15px;">🎡 العجلة اليومية</h3>
            <button class="sub-btn" style="background:#ffcc00;" onclick="spinWheel()">🎰 تدوير العجلة الآن</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" onclick="showTab('offer-panel', this)">
            <span>➕ عرض هدية</span>
        </button>
        <button class="nav-item" onclick="showTab('active-panel', this)">
            <span>📂 النشطة</span>
        </button>
        
        <button class="nav-item center-btn active" onclick="showTab('rent-panel', this)">
            <span>🔍 للايجار</span>
        </button>
        
        <button class="nav-item" onclick="showTab('my-offers-panel', this)">
            <span>📦 عروضي</span>
        </button>
        <button class="nav-item" onclick="showTab('wheel-panel', this)">
            <span>🎡 العجلة</span>
        </button>
    </div>

    <script>
        // دالة التنقل بين القوائم والتبويبات السفلية
        function showTab(panelId, button) {
            // إخفاء كل النوافذ
            const panels = document.querySelectorAll('.section-panel');
            panels.forEach(panel => panel.classList.remove('active'));
            
            // إزالة التحديد النشط من الأزرار
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            
            // إظهار النافذة المطلوبة وتحديد الزر
            document.getElementById(panelId).classList.add('active');
            button.classList.add('active');
        }

        // دالة العجلة اليومية التجريبية
        function spinWheel() {
            const prizes = [
                "🎁 مبروك! تأجير هدية مجاناً لمدة يوم",
                "❌ لم تربح شيء اليوم، حاول مجدداً غداً",
                "🎡 فرة أخرى! أعد تدوير العجلة",
                "👑 مبروك! اكتب لقبك الخاص داخل البوت"
            ];
            const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
            alert(randomPrize);
        }
    </script>
</body>
</html>
