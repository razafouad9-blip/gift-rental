<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Rental Luxury Velvet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0708;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- الهيدر العلوي الفخم باللون الماروني الملكي --- */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background-color: #160d0f;
            border-bottom: 1px solid #2d1418;
        }

        .header-title-premium {
            background: linear-gradient(135deg, #3d141a, #160d0f);
            border: 1px solid #800020;
            color: #ffb3c6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 10px rgba(128, 0, 32, 0.2);
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #160d0f;
            border: 1px solid #3d141a;
            color: #ffb3c6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* زر محفظة TON المعتمد */
        .ton-connect-btn {
            background-color: #0098ea;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(0, 152, 234, 0.25);
            letter-spacing: 0.3px;
        }

        /* --- المساحة الرئيسية --- */
        .content-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .page-view {
            display: none;
        }

        .page-view.active {
            display: block;
        }

        /* --- شريط التبويبات العلوي الماروني الفخم --- */
        .top-navigation-tabs {
            display: flex;
            gap: 24px;
            border-bottom: 1px solid #2d1418;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .nav-link {
            background: none;
            border: none;
            color: #634b4f;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .nav-link.active {
            color: #800020;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #800020;
            border-radius: 2px;
            box-shadow: 0 0 8px #800020;
        }

        .category-view {
            display: none;
        }

        .category-view.active {
            display: block;
        }

        .empty-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: #705559;
            font-size: 0.9rem;
            text-align: center;
            gap: 14px;
        }

        .empty-placeholder i {
            font-size: 3rem;
            color: #2d1418;
        }

        /* كارت تجريبي لاختبار صوت الإشعار وتأجير المقتنيات */
        .rent-test-card {
            background-color: #160d0f;
            border: 1px solid #2d1418;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .rent-action-trigger {
            background-color: #800020;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* كروت الملف الشخصي الجديد الفخم */
        .profile-card-premium {
            background: linear-gradient(135deg, #160d0f, #2d1418);
            border: 1px solid #3d141a;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .profile-card-premium i {
            font-size: 3rem;
            color: #ffb3c6;
            margin-bottom: 12px;
        }

        /* --- شريط التنقل السفلي الاحترافي ذو التكبير الذكي جداً --- */
        .dock-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(22, 13, 15, 0.96);
            backdrop-filter: blur(25px);
            border-top: 1px solid #2d1418;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 0 22px 0;
            z-index: 999;
        }

        .dock-tab {
            background: none;
            border: none;
            color: #523b3e; /* الأيقونات الأخرى باهتة وصغيرة جداً */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.62rem;
            font-weight: 600;
            gap: 5px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.85);
        }

        .dock-tab i {
            font-size: 1.15rem;
            transition: all 0.25s;
        }

        /* التكبير الملاحظ والفخم للتبويب الذي تتواجد فيه حالياً */
        .dock-tab.active {
            color: #ffb3c6;
            transform: scale(1.22); /* تكبير قوي للأيقونة النشطة */
        }

        .dock-tab.active i {
            color: #800020;
            filter: drop-shadow(0 0 6px rgba(128,0,32,0.6));
        }

        /* تنسيق زر للايجار بالمنتصف تماماً */
        .dock-tab.center-btn i {
            font-size: 1.3rem;
            background-color: #11090a;
            padding: 8px;
            border-radius: 50%;
            border: 1px solid #2d1418;
            margin-top: -15px;
        }

        .dock-tab.center-btn.active i {
            background-color: #800020;
            color: #ffffff;
            border-color: #800020;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="header-title-premium">
            <i class="fa-solid fa-gem"></i> Luxury Mode
        </div>
        <div class="action-buttons">
            <button class="ton-connect-btn" onclick="playClickSound(); alert('TON Connect Activation...')">
                <i class="fa-solid fa-wallet"></i> TON Connect
            </button>
            <button class="action-icon-btn" onclick="playClickSound(); alert('Settings')">
                <i class="fa-solid fa-sliders"></i>
            </button>
            <button class="action-icon-btn" style="color: #ff4d4d; border-color: #5a1818;" onclick="confirmAppClose()">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </div>

    <div class="content-area">

        <div id="view-rent" class="page-view active">
            <div class="top-navigation-tabs">
                <button class="nav-link active" onclick="playClickSound(); switchCategory('cat-gifts', this)">الهدايا</button>
                <button class="nav-link" onclick="playClickSound(); switchCategory('cat-users', this)">أسماء المستخدمين</button>
                <button class="nav-link" onclick="playClickSound(); switchCategory('cat-numbers', this)">الأرقام</button>
            </div>

            <div id="cat-gifts" class="category-view active">
                <div class="rent-test-card">
                    <div>
                        <h4 style="font-size: 0.9rem; margin-bottom: 4px;">باقة تجريبية فاخرة</h4>
                        <p style="font-size: 0.75rem; color: #705559;">اضغط لتجربة صوت إشعار الآيفون</p>
                    </div>
                    <button class="rent-action-trigger" onclick="triggerRentSuccess()">تأجير سريع ⚡</button>
                </div>
                <div class="empty-placeholder">
                    <i class="fa-solid fa-box-open"></i>
                    <p>لا توجد مقتنيات إضافية مطروحة حالياً</p>
                </div>
            </div>

            <div id="cat-users" class="category-view">
                <div class="empty-placeholder">
                    <i class="fa-solid fa-at"></i>
                    <p>لا توجد أسماء مستخدمين مطروحة حالياً</p>
                </div>
            </div>

            <div id="cat-numbers" class="category-view">
                <div class="empty-placeholder">
                    <i class="fa-solid fa-hashtag"></i>
                    <p>لا توجد أرقام متاحة حالياً</p>
                </div>
            </div>
        </div>

        <div id="view-offer" class="page-view">
            <div class="empty-placeholder"><i class="fa-solid fa-square-plus"></i><p>صفحة إضافة العروض والمنتجات</p></div>
        </div>

        <div id="view-active" class="page-view">
            <div class="empty-placeholder"><i class="fa-solid fa-receipt"></i><p>لا توجد عقود إيجار نشطة</p></div>
        </div>

        <div id="view-my-offers" class="page-view">
            <div class="empty-placeholder"><i class="fa-solid fa-folder-open"></i><p>قائمة العروض الخاصة بك فارغة</p></div>
        </div>

        <div id="view-profile" class="page-view">
            <div class="profile-card-premium">
                <i class="fa-solid fa-circle-user"></i>
                <h3>مستخدم متميز VIP</h3>
                <p style="font-size: 0.8rem; color: #ffb3c6; margin-top: 40px;">الحساب موثق ومحمي بالكامل</p>
            </div>
        </div>

    </div>

    <div class="dock-navbar">
        <button class="dock-tab" onclick="playClickSound(); changeTab('view-offer', this)">
            <i class="fa-solid fa-square-plus"></i>
            <span>عرض هدية</span>
        </button>
        <button class="dock-tab" onclick="playClickSound(); changeTab('view-active', this)">
            <i class="fa-solid fa-receipt"></i>
            <span>النشطة</span>
        </button>
        
        <button class="dock-tab center-btn active" onclick="playClickSound(); changeTab('view-rent', this)">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>للايجار</span>
        </button>
        
        <button class="dock-tab" onclick="playClickSound(); changeTab('view-my-offers', this)">
            <i class="fa-solid fa-folder-open"></i>
            <span>عروضي</span>
        </button>
        <button class="dock-tab" onclick="playClickSound(); changeTab('view-profile', this)">
            <i class="fa-solid fa-user-gear"></i>
            <span>الملف</span>
        </button>
    </div>

    <script>
        // توليد الأصوات برمجياً بدون الحاجة لرفع ملفات خارجية لضمان السرعة المطلقة
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. صوت ضغط راقي ومميز جداً (Taptic Tap Sound)
        function playClickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(160, audioCtx.currentTime); // تردد هادئ ونظيف
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // 2. صوت رنين إشعار الآيفون (iPhone Tri-Tone) النقي جداً
        function triggerRentSuccess() {
            playiPhoneNotification();
            alert("🎉 Success! Item Rented successfully.");
        }

        function playiPhoneNotification() {
            const now = audioCtx.currentTime;
            const notes = [587.33, 698.46, 880.00]; // نغمات متسارعة تحاكي إشعار الآيفون بدقة
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + (index * 0.08));
                gain.gain.setValueAtTime(0.2, now + (index * 0.08));
                gain.gain.exponentialRampToValueAtTime(0.01, now + (index * 0.08) + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.08));
                osc.stop(now + (index * 0.08) + 0.2);
            });
        }

        // دالة تأكيد الإغلاق باللغة الإنجليزية
        function confirmAppClose() {
            playClickSound();
            if (confirm("Are you sure you want to close the app?")) {
                // محاولة إغلاق نافذة التليجرام مدمجة برمجياً
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.close();
                } else {
                    window.close();
                }
            }
        }

        function changeTab(pageId, tabElement) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.dock-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            tabElement.classList.add('active');
        }

        function switchCategory(catId, btnElement) {
            document.querySelectorAll('.category-view').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(t => t.classList.remove('active'));
            document.getElementById(catId).classList.add('active');
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
